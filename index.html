<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Gastos da Obra</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:15px;
}

h1{
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
width:100%;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
font-weight:500;
transition:0.2s;
background:#2563eb;
color:white;
}

button:hover{
background:#1d4ed8;
}

.btn-editar{
background:#f59e0b;
color:white;
}

.btn-editar:hover{
background:#d97706;
}

.btn-excluir{
background:#ef4444;
color:white;
}

.btn-excluir:hover{
background:#dc2626;
}

.resumo{
background:#f8f8f8;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:600px;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#f1f1f1;
}

</style>

</head>

<body>

<div class="container">

<h1>Controle de Gastos da Obra</h1>

<h3>Adicionar / Editar gasto</h3>

<div class="form">

<input type="date" id="data">

<select id="categoria">
<option>Cimento</option>
<option>Areia</option>
<option>Brita</option>
<option>Tijolo/Bloco</option>
<option>Ferro</option>
<option>Madeira</option>
<option>Telhado</option>
<option>Elétrica</option>
<option>Hidráulica</option>
<option>Ferramentas</option>
<option>Mão de obra</option>
<option>Transporte</option>
<option>Outros</option>
</select>

<input type="text" id="descricao" placeholder="Descrição">

<input type="number" id="valorTotal" placeholder="Valor total">

<input type="number" id="valorPago" placeholder="Valor pago">

<button onclick="salvarGasto()">Salvar</button>

</div>

<div class="resumo">

<p>Total da obra: <b>R$ <span id="totalObra">0</span></b></p>

<p>Total pago: <b>R$ <span id="totalPago">0</span></b></p>

<p>Saldo a pagar: <b>R$ <span id="saldo">0</span></b></p>

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Data</th>
<th>Categoria</th>
<th>Descrição</th>
<th>Total</th>
<th>Pago</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

<script>

let gastos = JSON.parse(localStorage.getItem("gastos")) || []

let editIndex = -1

function salvarLocal(){

localStorage.setItem("gastos", JSON.stringify(gastos))

}

function salvarGasto(){

let data = document.getElementById("data").value
let categoria = document.getElementById("categoria").value
let descricao = document.getElementById("descricao").value
let valorTotal = Number(document.getElementById("valorTotal").value)
let valorPago = Number(document.getElementById("valorPago").value)

if(!descricao || !valorTotal){
alert("Preencha os campos")
return
}

let gasto = {
data,
categoria,
descricao,
valorTotal,
valorPago
}

if(editIndex === -1){

gastos.push(gasto)

}else{

gastos[editIndex] = gasto

editIndex = -1

}

salvarLocal()

renderizar()

limpar()

}

function editar(i){

let g = gastos[i]

document.getElementById("data").value = g.data
document.getElementById("categoria").value = g.categoria
document.getElementById("descricao").value = g.descricao
document.getElementById("valorTotal").value = g.valorTotal
document.getElementById("valorPago").value = g.valorPago

editIndex = i

window.scrollTo({
top:0,
behavior:"smooth"
})

}

function excluir(i){

if(confirm("Excluir este gasto?")){

gastos.splice(i,1)

salvarLocal()

renderizar()

}

}

function limpar(){

document.getElementById("descricao").value=""
document.getElementById("valorTotal").value=""
document.getElementById("valorPago").value=""

}

function renderizar(){

let lista = document.getElementById("lista")

lista.innerHTML=""

let totalObra = 0

let totalPago = 0

gastos.forEach((g,i)=>{

totalObra += g.valorTotal

totalPago += g.valorPago

lista.innerHTML += `

<tr>

<td>${g.data}</td>

<td>${g.categoria}</td>

<td>${g.descricao}</td>

<td>R$ ${g.valorTotal}</td>

<td>R$ ${g.valorPago}</td>

<td>

<button class="btn-editar" onclick="editar(${i})">✏️ Editar</button>

<button class="btn-excluir" onclick="excluir(${i})">🗑 Excluir</button>

</td>

</tr>

`

})

let saldo = totalObra - totalPago

document.getElementById("totalObra").innerText = totalObra

document.getElementById("totalPago").innerText = totalPago

document.getElementById("saldo").innerText = saldo

}

renderizar()

</script>

</body>

</html>
